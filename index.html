<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VideoPlayer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===== Loading Overlay ===== -->
<div id="loading-overlay" class="hidden" aria-hidden="true">
  <div class="loading-content">
    <div class="loading-spinner"></div>
    <div id="loading-message">読み込み中...</div>
    <div class="loading-bar-wrap">
      <div id="loading-bar"></div>
    </div>
    <div id="loading-percent">0%</div>
  </div>
</div>

<!-- ===== FILE LIST SCREEN ===== -->
<div id="screen-filelist" class="screen active">

  <header class="fl-header">
    <h1 class="fl-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      VideoPlayer
    </h1>
    <div class="fl-header-actions">
      <button class="btn-icon" id="btn-add-file">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <span>追加</span>
      </button>
      <button class="btn-icon" id="btn-open-tag-editor">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        <span>タグ編集</span>
      </button>
    </div>
  </header>

  <div class="fl-controls">
    <div class="fl-search-wrap">
      <span class="search-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input type="text" id="search-input" placeholder="名前・タグで検索..." autocomplete="off" spellcheck="false">
      <button class="search-clear hidden" id="btn-search-clear" aria-label="検索クリア">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="fl-sort-wrap">
      <select id="sort-select" aria-label="並べ替え">
        <option value="added-desc">追加順↓</option>
        <option value="added-asc">追加順↑</option>
        <option value="name-asc">名前順↑</option>
        <option value="name-desc">名前順↓</option>
      </select>
    </div>
  </div>

  <div class="fl-tag-filter-bar" id="tag-filter-bar" role="group" aria-label="タグフィルター"></div>

  <div class="fl-file-grid" id="file-grid" role="list"></div>

  <div class="fl-empty" id="fl-empty" style="display:none" aria-live="polite">
    <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
    <p>動画を追加してください</p>
    <p class="fl-empty-sub">「追加」ボタンから動画ファイルを選択</p>
  </div>

  <input type="file" id="file-input" accept="video/*" multiple style="display:none" aria-hidden="true">
</div>

<!-- ===== PLAYER SCREEN ===== -->
<div id="screen-player" class="screen">
  <div class="player-wrap" id="player-wrap">

    <video id="video-el" playsinline preload="auto"></video>

    <!-- Full UI overlay -->
    <div class="player-controls" id="player-controls">

      <!-- TOP BAR: Back | Seekbar | Play -->
      <div class="ctrl-top-bar">
        <button class="ctrl-btn" id="btn-back" aria-label="一覧に戻る">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>

        <div class="seekbar-wrap">
          <div class="seekbar-track" id="seekbar-track" role="slider" aria-label="再生位置">
            <div class="seekbar-loop-range" id="seekbar-loop-range"></div>
            <div class="seekbar-progress" id="seekbar-progress"></div>
            <div id="seekbar-markers"></div>
            <div class="seekbar-thumb" id="seekbar-thumb"></div>
          </div>
          <div class="seekbar-time">
            <span id="time-current">0:00</span>
            <span id="time-total">0:00</span>
          </div>
        </div>

        <button class="ctrl-btn" id="btn-play-pause" aria-label="再生・停止">
          <svg id="icon-play" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <svg id="icon-pause" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
      </div>

      <!-- LEFT CONTROLS (below Back) -->
      <div class="ctrl-left">
        <div class="ctrl-row">
          <button class="ctrl-btn skip-btn" id="btn-back3" aria-label="-3秒">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.25"/></svg>
            <span class="skip-label">3</span>
          </button>
          <button class="ctrl-btn skip-btn" id="btn-fwd3" aria-label="+3秒">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.25"/></svg>
            <span class="skip-label">3</span>
          </button>
        </div>
        <div class="ctrl-row">
          <button class="ctrl-btn skip-btn" id="btn-back5" aria-label="-5秒">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.25"/></svg>
            <span class="skip-label">5</span>
          </button>
          <button class="ctrl-btn skip-btn" id="btn-fwd5" aria-label="+5秒">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.25"/></svg>
            <span class="skip-label">5</span>
          </button>
        </div>
        <div class="ctrl-row">
          <button class="ctrl-btn" id="btn-mirror" aria-label="左右反転">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h3"/><path d="M16 3h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-3"/><line x1="12" y1="20" x2="12" y2="4"/></svg>
          </button>
        </div>
      </div>

      <!-- RIGHT CONTROLS (below Play) -->
      <div class="ctrl-right">
        <!-- Speed row -->
        <div class="ctrl-row ctrl-row-speed">
          <button class="ctrl-btn ctrl-btn-sm" id="btn-speed-down" aria-label="速度を下げる">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <div class="speed-display" id="speed-display">1.00x</div>
          <button class="ctrl-btn ctrl-btn-sm" id="btn-speed-up" aria-label="速度を上げる">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <!-- Marker row -->
        <div class="ctrl-row">
          <button class="ctrl-btn" id="btn-marker-jump" aria-label="マーカーへジャンプ">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
          </button>
          <button class="ctrl-btn" id="btn-marker-add" aria-label="マーカー追加">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </button>
          <button class="ctrl-btn" id="btn-marker-del" aria-label="マーカー削除">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><line x1="9" y1="7" x2="15" y2="13"/><line x1="15" y1="7" x2="9" y2="13"/></svg>
          </button>
        </div>
        <!-- Loop row -->
        <div class="ctrl-row">
          <button class="ctrl-btn" id="btn-loop-set" aria-label="ループ設定">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          </button>
          <button class="ctrl-btn" id="btn-loop-toggle" aria-label="ループ ON/OFF">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="10" y1="15" x2="10" y2="9"/><line x1="14" y1="15" x2="14" y2="9"/></svg>
          </button>
          <button class="ctrl-btn" id="btn-loop-del" aria-label="ループ削除">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
          </button>
        </div>
        <!-- UI Hide -->
        <div class="ctrl-row">
          <button class="ctrl-btn" id="btn-ui-hide" aria-label="UI非表示">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

    </div><!-- /player-controls -->

    <!-- UI Show button (only visible when UI is hidden) -->
    <button class="ctrl-btn ui-show-btn hidden" id="btn-ui-show" aria-label="UI表示">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>

  </div><!-- /player-wrap -->
</div><!-- /screen-player -->

<!-- ===== TAG EDITOR MODAL ===== -->
<div id="modal-tag-editor" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="tag-editor-title">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="tag-editor-title">タグ編集</h2>
      <button class="btn-close" id="btn-close-tag-editor" aria-label="閉じる">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div id="tag-editor-list"></div>
      <div class="tag-add-form">
        <input type="text" id="new-tag-name" placeholder="新しいタグ名..." maxlength="30" autocomplete="off">
        <input type="color" id="new-tag-color" value="#3b82f6" aria-label="タグの色">
        <button class="btn-primary" id="btn-add-tag">追加</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== FILE TAG EDIT MODAL ===== -->
<div id="modal-file-tags" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="file-tags-modal-title">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="file-tags-modal-title">タグを編集</h2>
      <button class="btn-close" id="btn-close-file-tags" aria-label="閉じる">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="file-tags-body"></div>
  </div>
</div>

<script src="js/utils.js"></script>
<script src="js/db.js"></script>
<script src="js/store.js"></script>
<script src="js/filelist.js"></script>
<script src="js/tagEditor.js"></script>
<script src="js/player.js"></script>
<script src="js/app.js"></script>
</body>
</html>
