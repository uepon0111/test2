<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VideoPlayer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap">
<style>
/* =====================================================
   Variables
   ===================================================== */
:root {
  --bg:          #ffffff;
  --surface:     #f8f9fb;
  --surface2:    #eef0f3;
  --border:      #e2e8f0;
  --border2:     #cbd5e1;
  --text:        #111827;
  --text2:       #4b5563;
  --text3:       #9ca3af;
  --accent:      #2563eb;
  --accent-bg:   #dbeafe;
  --danger:      #ef4444;
  --danger-bg:   #fee2e2;
  --shadow-sm:   0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow:      0 4px 8px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.05);
  --shadow-lg:   0 12px 30px rgba(0,0,0,.12),0 4px 10px rgba(0,0,0,.06);
  --radius:      12px;
  --radius-sm:   8px;
  --btn:         44px;
  --btn-sm:      36px;
  --ctrl-gap:    8px;
  --ctrl-pad:    12px;
  --font:        'Noto Sans JP',sans-serif;
}

/* =====================================================
   Reset
   ===================================================== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;overflow:hidden;
  font-family:var(--font);background:var(--bg);color:var(--text);
  -webkit-text-size-adjust:100%;overscroll-behavior:none;
}
button{
  cursor:pointer;border:none;background:none;font-family:inherit;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
  user-select:none;-webkit-user-select:none;
}
input,select{font-family:inherit}

/* =====================================================
   Screens
   ===================================================== */
.screen{position:fixed;inset:0;display:none;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* =====================================================
   Loading
   ===================================================== */
#loading-overlay{
  position:fixed;inset:0;z-index:9000;
  background:rgba(255,255,255,.93);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
}
#loading-overlay.hidden{display:none}
.loading-content{display:flex;flex-direction:column;align-items:center;gap:14px;padding:40px 32px}
.loading-spinner{
  width:38px;height:38px;
  border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-message{font-size:14px;font-weight:500;color:var(--text2);letter-spacing:.01em}
.loading-bar-wrap{width:200px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
#loading-bar{height:100%;width:0%;background:var(--accent);border-radius:2px;transition:width .2s ease}
#loading-percent{font-size:12px;color:var(--text3);font-weight:500}

/* =====================================================
   File List Screen
   ===================================================== */
#screen-filelist{background:var(--bg)}

.fl-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid var(--border);
  background:var(--bg);flex-shrink:0;gap:10px;
}
.fl-title{
  display:flex;align-items:center;gap:9px;
  font-size:19px;font-weight:700;color:var(--text);
  letter-spacing:-.02em;white-space:nowrap;
}
.fl-header-actions{display:flex;gap:7px;flex-shrink:0}

.btn-icon{
  display:flex;align-items:center;gap:6px;
  padding:7px 13px;border-radius:var(--radius-sm);
  background:var(--surface);color:var(--text2);
  font-size:13px;font-weight:500;
  border:1px solid var(--border);
  transition:background .14s,color .14s;white-space:nowrap;
}
.btn-icon:hover{background:var(--surface2);color:var(--text)}
.btn-icon svg{flex-shrink:0}

.fl-controls{
  display:flex;gap:8px;padding:10px 16px;
  border-bottom:1px solid var(--border);flex-shrink:0;align-items:center;
}
.fl-search-wrap{flex:1;position:relative;display:flex;align-items:center;min-width:0}
.search-icon{position:absolute;left:10px;color:var(--text3);display:flex;pointer-events:none;flex-shrink:0}
#search-input{
  width:100%;padding:8px 32px;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--surface);font-size:14px;color:var(--text);
  outline:none;transition:border-color .14s,background .14s;min-width:0;
}
#search-input:focus{border-color:var(--accent);background:var(--bg)}
#search-input::placeholder{color:var(--text3)}
.search-clear{
  position:absolute;right:7px;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;color:var(--text3);
  transition:color .14s,background .14s;
}
.search-clear:hover{color:var(--text);background:var(--surface2)}
.search-clear.hidden{display:none}
.fl-sort-wrap select{
  padding:8px 10px;border:1px solid var(--border);
  border-radius:var(--radius-sm);background:var(--surface);
  font-size:13px;color:var(--text);outline:none;cursor:pointer;
  white-space:nowrap;flex-shrink:0;
}

.fl-tag-filter-bar{
  display:flex;gap:6px;padding:8px 16px;
  overflow-x:auto;flex-shrink:0;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
  border-bottom:1px solid var(--border);
}
.fl-tag-filter-bar:empty{padding:0;border-bottom:none}
.fl-tag-filter-bar::-webkit-scrollbar{display:none}
.tag-filter-chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 11px;border-radius:20px;border:1.5px solid;
  font-size:12px;font-weight:500;white-space:nowrap;
  cursor:pointer;flex-shrink:0;transition:background .14s,color .14s;
  background:transparent;
}

.fl-file-grid{
  flex:1;overflow-y:auto;padding:12px 14px;
  display:grid;gap:10px;align-content:start;
  -webkit-overflow-scrolling:touch;
}
@media (orientation:portrait),(max-width:540px){.fl-file-grid{grid-template-columns:1fr}}
@media (orientation:landscape) and (min-width:541px){.fl-file-grid{grid-template-columns:repeat(2,1fr)}}
@media (orientation:landscape) and (min-width:900px){.fl-file-grid{grid-template-columns:repeat(3,1fr)}}
@media (orientation:landscape) and (min-width:1200px){.fl-file-grid{grid-template-columns:repeat(4,1fr)}}
@media (min-width:540px) and (orientation:portrait){.fl-file-grid{grid-template-columns:repeat(2,1fr)}}

.fl-empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:12px;color:var(--text3);padding:40px 20px;
}
.fl-empty p{font-size:15px;font-weight:500}
.fl-empty-sub{font-size:13px!important;font-weight:400!important;color:var(--text3)}

.file-card{
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius);padding:13px 14px;
  cursor:pointer;transition:box-shadow .14s,border-color .14s;
  display:flex;flex-direction:column;gap:10px;
  -webkit-touch-callout:none;user-select:none;-webkit-user-select:none;
}
.file-card:hover{box-shadow:var(--shadow);border-color:var(--border2)}
.file-card:active{background:var(--surface)}
.file-card-top{display:flex;align-items:flex-start;gap:11px}
.file-thumb{
  width:62px;height:40px;border-radius:6px;
  background:#1e2330;display:flex;align-items:center;justify-content:center;
  color:#4b5563;flex-shrink:0;overflow:hidden;
}
.file-info{flex:1;min-width:0}
.file-name{
  font-size:14px;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;
}
.file-name-input{
  font-size:14px;font-weight:600;border:1.5px solid var(--accent);
  border-radius:5px;padding:2px 7px;outline:none;
  width:100%;color:var(--text);background:var(--bg);
}
.file-meta{font-size:11px;color:var(--text3);margin-top:2px}
.file-actions{display:flex;gap:3px;flex-shrink:0}
.file-action-btn{
  width:29px;height:29px;display:flex;align-items:center;justify-content:center;
  border-radius:7px;color:var(--text3);transition:color .14s,background .14s;
}
.file-action-btn:hover{color:var(--text);background:var(--surface)}
.file-action-btn.danger:hover{color:var(--danger);background:var(--danger-bg)}
.file-tags{display:flex;flex-wrap:wrap;gap:4px}
.file-tag-chip{
  padding:2px 9px;border-radius:10px;
  font-size:11px;font-weight:500;color:#fff;white-space:nowrap;
}

/* =====================================================
   Modals
   ===================================================== */
.modal-overlay{
  position:fixed;inset:0;z-index:800;
  background:rgba(0,0,0,.45);
  display:flex;align-items:center;justify-content:center;
  padding:20px;backdrop-filter:blur(2px);
}
.modal-overlay.hidden{display:none}
.modal-box{
  background:var(--bg);border-radius:16px;
  width:100%;max-width:480px;max-height:80vh;
  display:flex;flex-direction:column;
  box-shadow:var(--shadow-lg);overflow:hidden;
}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.modal-header h2{font-size:16px;font-weight:700}
.btn-close{
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  border-radius:7px;color:var(--text3);transition:color .14s,background .14s;
}
.btn-close:hover{color:var(--text);background:var(--surface)}
.modal-body{
  flex:1;overflow-y:auto;padding:16px 20px;
  display:flex;flex-direction:column;gap:12px;
  -webkit-overflow-scrolling:touch;
}

#tag-editor-list{display:flex;flex-direction:column;gap:7px}
.tag-editor-item{
  display:flex;align-items:center;gap:8px;
  padding:9px 11px;background:var(--surface);
  border-radius:var(--radius-sm);border:1px solid var(--border);
  transition:border-color .14s;
}
.tag-editor-item.drag-over{border-color:var(--accent);background:var(--accent-bg)}
.tag-editor-item.dragging{opacity:.45}
.drag-handle{color:var(--text3);cursor:grab;flex-shrink:0;display:flex;align-items:center;touch-action:none}
.tag-color-swatch{
  width:28px;height:28px;border-radius:50%;
  border:2px solid var(--border);cursor:pointer;flex-shrink:0;
  position:relative;overflow:hidden;
}
.tag-color-swatch input[type="color"]{
  position:absolute;inset:-4px;opacity:0;
  width:calc(100% + 8px);height:calc(100% + 8px);
  cursor:pointer;border:none;padding:0;
}
.tag-editor-name-input{
  flex:1;min-width:0;padding:6px 9px;
  border:1px solid var(--border);border-radius:6px;
  font-size:13px;color:var(--text);background:var(--bg);
  outline:none;transition:border-color .14s;
}
.tag-editor-name-input:focus{border-color:var(--accent)}
.tag-del-btn{
  width:28px;height:28px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border-radius:6px;color:var(--danger);background:var(--danger-bg);
  transition:opacity .14s;
}
.tag-del-btn:hover{opacity:.8}

.tag-add-form{
  display:flex;gap:8px;align-items:center;
  padding-top:4px;border-top:1px solid var(--border);flex-shrink:0;
}
#new-tag-name{
  flex:1;min-width:0;padding:8px 11px;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  font-size:14px;color:var(--text);background:var(--surface);
  outline:none;transition:border-color .14s,background .14s;
}
#new-tag-name:focus{border-color:var(--accent);background:var(--bg)}
#new-tag-name::placeholder{color:var(--text3)}
#new-tag-color{
  width:38px;height:38px;flex-shrink:0;
  border-radius:var(--radius-sm);border:1px solid var(--border);
  padding:3px;cursor:pointer;background:var(--surface);
}
.btn-primary{
  padding:8px 15px;flex-shrink:0;border-radius:var(--radius-sm);
  background:var(--accent);color:#fff;
  font-size:13px;font-weight:600;white-space:nowrap;transition:opacity .14s;
}
.btn-primary:hover{opacity:.88}

.file-tag-checkbox-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 4px;border-bottom:1px solid var(--border);cursor:pointer;
}
.file-tag-checkbox-item:last-child{border-bottom:none}
.file-tag-checkbox-item input[type="checkbox"]{
  width:17px;height:17px;cursor:pointer;accent-color:var(--accent);flex-shrink:0;
}
.file-tag-checkbox-label{
  display:flex;align-items:center;gap:8px;
  font-size:14px;font-weight:500;cursor:pointer;
}
.tag-dot-swatch{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* =====================================================
   Player Screen
   ===================================================== */
#screen-player{background:#000}
.player-wrap{
  position:relative;width:100%;height:100%;
  overflow:hidden;background:#000;touch-action:none;
}
#video-el{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  max-width:100%;max-height:100%;
  width:100%;height:100%;object-fit:contain;background:#000;
}
#video-el.mirrored{transform:translate(-50%,-50%) scaleX(-1)}

.player-controls{position:absolute;inset:0;pointer-events:none}
.player-controls > *{pointer-events:auto}

/* Circular buttons */
.ctrl-btn{
  width:var(--btn);height:var(--btn);border-radius:50%;
  border:2px solid rgba(255,255,255,.82);
  background:rgba(0,0,0,.18);color:#fff;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;position:relative;
  -webkit-touch-callout:none;
  user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  transition:background .12s,border-color .12s;
}
.ctrl-btn:active{background:rgba(255,255,255,.22)}
.ctrl-btn.active{background:rgba(255,255,255,.25);border-color:#fff}
.ctrl-btn-sm{width:var(--btn-sm);height:var(--btn-sm)}

.skip-btn{flex-direction:column;gap:0}
.skip-btn svg{margin-top:2px}
.skip-label{
  font-size:10px;font-weight:800;color:#fff;line-height:1;
  margin-top:1px;text-shadow:0 1px 2px rgba(0,0,0,.6);
}

/* Top bar */
.ctrl-top-bar{
  position:absolute;
  top:var(--ctrl-pad);left:var(--ctrl-pad);right:var(--ctrl-pad);
  display:flex;align-items:center;gap:10px;
}

/* Seekbar */
.seekbar-wrap{flex:1;display:flex;flex-direction:column;gap:5px;min-width:0}
.seekbar-track{
  position:relative;height:6px;
  background:rgba(255,255,255,.28);border-radius:3px;
  cursor:pointer;touch-action:none;
}
.seekbar-progress{
  position:absolute;top:0;left:0;height:100%;
  background:rgba(255,255,255,.9);border-radius:3px;
  pointer-events:none;width:0%;transition:width .05s linear;
}
.seekbar-loop-range{
  position:absolute;top:0;height:100%;
  background:rgba(59,130,246,.55);pointer-events:none;display:none;
}
.seekbar-loop-range.visible{display:block}
.seekbar-loop-start,
.seekbar-loop-end{
  position:absolute;top:-3px;bottom:-3px;width:3px;
  pointer-events:none;border-radius:2px;
}
.seekbar-loop-start{background:#3b82f6;transform:translateX(-50%)}
.seekbar-loop-end{background:#ef4444;transform:translateX(-50%)}
#seekbar-markers{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.seekbar-marker-dot{
  position:absolute;top:50%;transform:translate(-50%,-50%);
  width:9px;height:9px;background:#fbbf24;border-radius:50%;
  border:1.5px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4);
}
.seekbar-thumb{
  position:absolute;top:50%;transform:translate(-50%,-50%);
  width:14px;height:14px;background:#fff;border-radius:50%;
  pointer-events:none;left:0%;box-shadow:0 1px 4px rgba(0,0,0,.4);
}
.seekbar-time{
  display:flex;justify-content:space-between;
  font-size:11px;font-weight:500;
  color:rgba(255,255,255,.85);text-shadow:0 1px 3px rgba(0,0,0,.55);
}

/* Left controls */
.ctrl-left{
  position:absolute;
  top:calc(var(--ctrl-pad) + var(--btn) + 10px);
  left:var(--ctrl-pad);
  display:flex;flex-direction:column;gap:var(--ctrl-gap);
}
/* Right controls */
.ctrl-right{
  position:absolute;
  top:calc(var(--ctrl-pad) + var(--btn) + 10px);
  right:var(--ctrl-pad);
  display:flex;flex-direction:column;gap:var(--ctrl-gap);align-items:flex-end;
}
.ctrl-row{display:flex;gap:var(--ctrl-gap);align-items:center}
.ctrl-row-speed{gap:6px}
.speed-display{
  min-width:46px;text-align:center;
  font-size:12px;font-weight:800;color:#fff;
  letter-spacing:.01em;text-shadow:0 1px 4px rgba(0,0,0,.6);white-space:nowrap;
}

.ui-show-btn{position:absolute;top:var(--ctrl-pad);right:var(--ctrl-pad);z-index:10}
.ui-show-btn.hidden{display:none}

/* =====================================================
   Responsive
   ===================================================== */
@media (max-height:420px){
  :root{--btn:36px;--btn-sm:30px;--ctrl-gap:6px;--ctrl-pad:8px}
  .skip-label{font-size:9px}
  .seekbar-time{font-size:10px}
}
@media (max-width:360px){
  .fl-title{font-size:16px}
  .btn-icon span{display:none}
  .btn-icon{padding:7px 10px}
}
</style>
</head>
<body>

<!-- Loading Overlay -->
<div id="loading-overlay" class="hidden">
  <div class="loading-content">
    <div class="loading-spinner"></div>
    <div id="loading-message">読み込み中...</div>
    <div class="loading-bar-wrap"><div id="loading-bar"></div></div>
    <div id="loading-percent">0%</div>
  </div>
</div>

<!-- ===== FILE LIST SCREEN ===== -->
<div id="screen-filelist" class="screen active">
  <header class="fl-header">
    <h1 class="fl-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      VideoPlayer
    </h1>
    <div class="fl-header-actions">
      <button class="btn-icon" id="btn-add-file">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <span>追加</span>
      </button>
      <button class="btn-icon" id="btn-open-tag-editor">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        <span>タグ編集</span>
      </button>
    </div>
  </header>

  <div class="fl-controls">
    <div class="fl-search-wrap">
      <span class="search-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input type="text" id="search-input" placeholder="名前・タグで検索..." autocomplete="off" spellcheck="false">
      <button class="search-clear hidden" id="btn-search-clear" aria-label="検索クリア">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="fl-sort-wrap">
      <select id="sort-select" aria-label="並べ替え">
        <option value="added-desc">追加順↓</option>
        <option value="added-asc">追加順↑</option>
        <option value="name-asc">名前順↑</option>
        <option value="name-desc">名前順↓</option>
      </select>
    </div>
  </div>

  <div class="fl-tag-filter-bar" id="tag-filter-bar"></div>
  <div class="fl-file-grid" id="file-grid" role="list"></div>
  <div class="fl-empty" id="fl-empty" style="display:none">
    <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
    <p>動画を追加してください</p>
    <p class="fl-empty-sub">「追加」ボタンから動画ファイルを選択</p>
  </div>
  <input type="file" id="file-input" accept="video/*" multiple style="display:none">
</div>

<!-- ===== PLAYER SCREEN ===== -->
<div id="screen-player" class="screen">
  <div class="player-wrap" id="player-wrap">

<script>
/* =====================================================
   utils.js
   ===================================================== */
function formatTime(sec){
  if(!isFinite(sec)||sec<0)sec=0;
  const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=Math.floor(sec%60);
  if(h>0)return`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return`${m}:${String(s).padStart(2,'0')}`;
}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
function humanSize(bytes){
  if(bytes<1024)return bytes+' B';
  if(bytes<1048576)return(bytes/1024).toFixed(1)+' KB';
  return(bytes/1048576).toFixed(1)+' MB';
}
function showLoading(msg='読み込み中...'){
  document.getElementById('loading-message').textContent=msg;
  document.getElementById('loading-bar').style.width='0%';
  document.getElementById('loading-percent').textContent='0%';
  document.getElementById('loading-overlay').classList.remove('hidden');
}
function updateLoadingProgress(pct){
  const p=clamp(Math.round(pct),0,100);
  document.getElementById('loading-bar').style.width=p+'%';
  document.getElementById('loading-percent').textContent=p+'%';
}
function hideLoading(){document.getElementById('loading-overlay').classList.add('hidden')}
function noLongPress(el){el.addEventListener('contextmenu',e=>e.preventDefault())}
function initNoLongPress(){document.querySelectorAll('.ctrl-btn').forEach(noLongPress)}

/* =====================================================
   db.js
   ===================================================== */
const DB_NAME='videoplayer-db',DB_VERSION=2;
let _db=null;
function openDB(){
  return new Promise((resolve,reject)=>{
    if(_db){resolve(_db);return}
    const req=indexedDB.open(DB_NAME,DB_VERSION);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains('blobs'))db.createObjectStore('blobs',{keyPath:'id'});
      if(!db.objectStoreNames.contains('settings'))db.createObjectStore('settings',{keyPath:'key'});
    };
    req.onsuccess=e=>{_db=e.target.result;resolve(_db)};
    req.onerror=e=>reject(e.target.error);
  });
}
function dbSaveBlob(id,blob,onProgress){
  return new Promise(async(resolve,reject)=>{
    const db=await openDB();
    let pct=0;
    const tick=setInterval(()=>{pct=Math.min(pct+4,88);if(onProgress)onProgress(pct)},60);
    const tx=db.transaction('blobs','readwrite');
    const req=tx.objectStore('blobs').put({id,blob});
    req.onsuccess=()=>{clearInterval(tick);if(onProgress)onProgress(100);resolve()};
    req.onerror=e=>{clearInterval(tick);reject(e.target.error)};
  });
}
function dbGetBlob(id){
  return new Promise(async(resolve,reject)=>{
    const db=await openDB();
    const tx=db.transaction('blobs','readonly');
    const req=tx.objectStore('blobs').get(id);
    req.onsuccess=e=>resolve(e.target.result?e.target.result.blob:null);
    req.onerror=e=>reject(e.target.error);
  });
}
function dbDeleteBlob(id){
  return new Promise(async(resolve,reject)=>{
    const db=await openDB();
    const tx=db.transaction('blobs','readwrite');
    const req=tx.objectStore('blobs').delete(id);
    req.onsuccess=()=>resolve();
    req.onerror=e=>reject(e.target.error);
  });
}
async function dbGet(key){
  const db=await openDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction('settings','readonly');
    const req=tx.objectStore('settings').get(key);
    req.onsuccess=e=>resolve(e.target.result?e.target.result.value:undefined);
    req.onerror=e=>reject(e.target.error);
  });
}
async function dbSet(key,value){
  const db=await openDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction('settings','readwrite');
    const req=tx.objectStore('settings').put({key,value});
    req.onsuccess=()=>resolve();
    req.onerror=e=>reject(e.target.error);
  });
}

/* =====================================================
   store.js
   ===================================================== */
const Store=(()=>{
  let state={files:[],tags:[],playerData:{}};
  async function load(){
    const files=await dbGet('files');
    const tags=await dbGet('tags');
    const playerData=await dbGet('playerData');
    if(files)state.files=files;
    if(tags)state.tags=tags;
    if(playerData)state.playerData=playerData;
  }
  async function saveFiles(){await dbSet('files',state.files)}
  async function saveTags(){await dbSet('tags',state.tags)}
  async function savePlayerData(){await dbSet('playerData',state.playerData)}
  function getFiles(){return state.files}
  async function addFile(file,blobSaveCallback){
    const id=genId();
    const meta={id,name:file.name,addedAt:Date.now(),size:file.size,tagIds:[]};
    state.files.push(meta);
    await saveFiles();
    if(blobSaveCallback)await blobSaveCallback(id,file);
    return id;
  }
  async function deleteFile(id){
    state.files=state.files.filter(f=>f.id!==id);
    delete state.playerData[id];
    await saveFiles();await savePlayerData();await dbDeleteBlob(id);
  }
  async function renameFile(id,newName){
    const f=state.files.find(f=>f.id===id);
    if(f){f.name=newName;await saveFiles()}
  }
  async function setFileTags(id,tagIds){
    const f=state.files.find(f=>f.id===id);
    if(f){f.tagIds=tagIds;await saveFiles()}
  }
  function getTags(){return state.tags}
  async function addTag(name,color){
    const tag={id:genId(),name,color,order:state.tags.length};
    state.tags.push(tag);await saveTags();return tag;
  }
  async function updateTag(id,changes){
    const t=state.tags.find(t=>t.id===id);
    if(t){Object.assign(t,changes);await saveTags()}
  }
  async function deleteTag(id){
    state.tags=state.tags.filter(t=>t.id!==id);
    state.files.forEach(f=>{f.tagIds=f.tagIds.filter(tid=>tid!==id)});
    await saveTags();await saveFiles();
  }
  async function reorderTags(newOrder){
    newOrder.forEach((id,idx)=>{const t=state.tags.find(t=>t.id===id);if(t)t.order=idx});
    state.tags.sort((a,b)=>a.order-b.order);await saveTags();
  }
  function getPlayerData(fileId){
    if(!state.playerData[fileId])state.playerData[fileId]={markers:[],loop:null};
    return state.playerData[fileId];
  }
  async function addMarker(fileId,seconds){
    const pd=getPlayerData(fileId);
    if(!pd.markers.includes(seconds)){
      pd.markers.push(seconds);pd.markers.sort((a,b)=>a-b);await savePlayerData();
    }
  }
  async function deleteNearestMarkerBefore(fileId,currentTime){
    const pd=getPlayerData(fileId);
    const before=pd.markers.filter(m=>m<=currentTime);
    if(!before.length)return;
    const nearest=before[before.length-1];
    pd.markers=pd.markers.filter(m=>m!==nearest);
    await savePlayerData();return nearest;
  }
  async function setLoopStart(fileId,seconds){
    const pd=getPlayerData(fileId);
    if(!pd.loop)pd.loop={start:null,end:null};
    pd.loop.start=seconds;pd.loop.end=null;await savePlayerData();
  }
  async function setLoopEnd(fileId,seconds){
    const pd=getPlayerData(fileId);
    if(!pd.loop)pd.loop={start:null,end:null};
    pd.loop.end=seconds;await savePlayerData();
  }
  async function deleteLoop(fileId){
    const pd=getPlayerData(fileId);pd.loop=null;await savePlayerData();
  }
  return{
    load,getFiles,addFile,deleteFile,renameFile,setFileTags,
    getTags,addTag,updateTag,deleteTag,reorderTags,
    getPlayerData,addMarker,deleteNearestMarkerBefore,
    setLoopStart,setLoopEnd,deleteLoop
  };
})();

/* =====================================================
   filelist.js
   ===================================================== */
const FileList=(()=>{
  let searchQuery='',sortMode='added-desc',activeTagFilter=null;
  const grid=document.getElementById('file-grid');
  const emptyState=document.getElementById('fl-empty');
  const searchInput=document.getElementById('search-input');
  const clearBtn=document.getElementById('btn-search-clear');
  const sortSelect=document.getElementById('sort-select');
  const tagFilterBar=document.getElementById('tag-filter-bar');
  const fileInput=document.getElementById('file-input');

  function init(){
    document.getElementById('btn-add-file').addEventListener('click',()=>fileInput.click());
    fileInput.addEventListener('change',handleFileInput);
    searchInput.addEventListener('input',onSearch);
    clearBtn.addEventListener('click',clearSearch);
    sortSelect.addEventListener('change',()=>{sortMode=sortSelect.value;render()});
    render();
  }
  function onSearch(){
    searchQuery=searchInput.value.trim().toLowerCase();
    clearBtn.classList.toggle('hidden',searchQuery==='');
    render();
  }
  function clearSearch(){searchInput.value='';searchQuery='';clearBtn.classList.add('hidden');render()}

  async function handleFileInput(e){
    const files=Array.from(e.target.files);e.target.value='';
    if(!files.length)return;
    showLoading(`0 / ${files.length} 件 追加中...`);
    for(let i=0;i<files.length;i++){
      const file=files[i];
      await Store.addFile(file,async(id,f)=>{
        await dbSaveBlob(id,f,(pct)=>{
          updateLoadingProgress((i/files.length)*100+(1/files.length)*pct);
        });
      });
      document.getElementById('loading-message').textContent=`${i+1} / ${files.length} 件 追加中...`;
    }
    hideLoading();render();
  }

  async function deleteFile(id){
    showLoading('削除中...');updateLoadingProgress(30);
    await Store.deleteFile(id);
    updateLoadingProgress(100);hideLoading();render();
  }

  function startRename(id,cardEl){
    const nameEl=cardEl.querySelector('.file-name');
    const current=nameEl.textContent;
    const input=document.createElement('input');
    input.className='file-name-input';input.value=current;
    nameEl.replaceWith(input);input.focus();input.select();
    const finish=async()=>{
      const val=input.value.trim()||current;
      await Store.renameFile(id,val);render();
    };
    input.addEventListener('blur',finish);
    input.addEventListener('keydown',e=>{
      if(e.key==='Enter')input.blur();
      if(e.key==='Escape'){input.value=current;input.blur()}
    });
  }

  function getFilteredSorted(){
    let list=Store.getFiles().slice();
    if(activeTagFilter)list=list.filter(f=>f.tagIds.includes(activeTagFilter));
    if(searchQuery){
      const tags=Store.getTags();
      list=list.filter(f=>{
        if(f.name.toLowerCase().includes(searchQuery))return true;
        return f.tagIds.some(tid=>{
          const t=tags.find(t=>t.id===tid);
          return t&&t.name.toLowerCase().includes(searchQuery);
        });
      });
    }
    switch(sortMode){
      case'added-desc':list.sort((a,b)=>b.addedAt-a.addedAt);break;
      case'added-asc': list.sort((a,b)=>a.addedAt-b.addedAt);break;
      case'name-asc':  list.sort((a,b)=>a.name.localeCompare(b.name,'ja'));break;
      case'name-desc': list.sort((a,b)=>b.name.localeCompare(a.name,'ja'));break;
    }
    return list;
  }

  function renderTagFilterBar(){
    const tags=Store.getTags();
    tagFilterBar.innerHTML='';
    tags.forEach(tag=>{
      const chip=document.createElement('button');
      chip.className='tag-filter-chip';
      chip.textContent=tag.name;
      chip.style.borderColor=tag.color;
      chip.style.color=activeTagFilter===tag.id?'#fff':tag.color;
      chip.style.background=activeTagFilter===tag.id?tag.color:'transparent';
      chip.addEventListener('click',()=>{
        activeTagFilter=(activeTagFilter===tag.id)?null:tag.id;
        renderTagFilterBar();render();
      });
      tagFilterBar.appendChild(chip);
    });
  }

  function buildCard(file){
    const tags=Store.getTags();
    const card=document.createElement('div');
    card.className='file-card';card.setAttribute('role','listitem');card.dataset.id=file.id;
    card.addEventListener('click',e=>{
      if(e.target.closest('.file-actions,.file-name-input,.file-tags'))return;
      App.openPlayer(file.id);
    });

    const top=document.createElement('div');top.className='file-card-top';
    const thumb=document.createElement('div');thumb.className='file-thumb';
    thumb.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>`;

    const info=document.createElement('div');info.className='file-info';
    const nameEl=document.createElement('div');nameEl.className='file-name';nameEl.textContent=file.name;nameEl.title=file.name;
    const meta=document.createElement('div');meta.className='file-meta';
    const d=new Date(file.addedAt);
    meta.textContent=`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}  ${humanSize(file.size)}`;
    info.appendChild(nameEl);info.appendChild(meta);

    const actions=document.createElement('div');actions.className='file-actions';

    const btnRename=document.createElement('button');
    btnRename.className='file-action-btn';btnRename.title='名前を編集';
    btnRename.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
    btnRename.addEventListener('click',e=>{e.stopPropagation();startRename(file.id,card)});

    const btnTag=document.createElement('button');
    btnTag.className='file-action-btn';btnTag.title='タグを編集';
    btnTag.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>`;
    btnTag.addEventListener('click',e=>{e.stopPropagation();openFileTagModal(file.id)});

    const btnDel=document.createElement('button');
    btnDel.className='file-action-btn danger';btnDel.title='削除';
    btnDel.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;
    btnDel.addEventListener('click',e=>{e.stopPropagation();deleteFile(file.id)});

    actions.appendChild(btnRename);actions.appendChild(btnTag);actions.appendChild(btnDel);
    top.appendChild(thumb);top.appendChild(info);top.appendChild(actions);

    const tagsRow=document.createElement('div');tagsRow.className='file-tags';
    file.tagIds.forEach(tid=>{
      const t=tags.find(t=>t.id===tid);if(!t)return;
      const chip=document.createElement('span');
      chip.className='file-tag-chip';chip.textContent=t.name;chip.style.background=t.color;
      tagsRow.appendChild(chip);
    });

    card.appendChild(top);
    if(file.tagIds.length)card.appendChild(tagsRow);
    return card;
  }

  function render(){
    renderTagFilterBar();
    const list=getFilteredSorted();
    grid.innerHTML='';
    if(!Store.getFiles().length){emptyState.style.display='flex';return}
    emptyState.style.display='none';
    if(!list.length){
      const msg=document.createElement('div');
      msg.style.cssText='color:var(--text3);font-size:14px;padding:32px 16px;text-align:center;grid-column:1/-1;';
      msg.textContent='該当するファイルが見つかりません';
      grid.appendChild(msg);return;
    }
    list.forEach(f=>grid.appendChild(buildCard(f)));
  }

  let _editingFileId=null;
  function openFileTagModal(fileId){
    _editingFileId=fileId;
    const file=Store.getFiles().find(f=>f.id===fileId);
    const tags=Store.getTags();
    const body=document.getElementById('file-tags-body');
    body.innerHTML='';
    if(!tags.length){
      body.innerHTML='<p style="color:var(--text3);font-size:14px;">タグがありません。先にタグを作成してください。</p>';
    }else{
      tags.forEach(tag=>{
        const item=document.createElement('label');item.className='file-tag-checkbox-item';
        const cb=document.createElement('input');cb.type='checkbox';cb.checked=file.tagIds.includes(tag.id);
        cb.addEventListener('change',async()=>{
          const f=Store.getFiles().find(f=>f.id===_editingFileId);
          let ids=f.tagIds.slice();
          if(cb.checked){if(!ids.includes(tag.id))ids.push(tag.id)}
          else ids=ids.filter(i=>i!==tag.id);
          await Store.setFileTags(_editingFileId,ids);render();
        });
        const lbl=document.createElement('span');lbl.className='file-tag-checkbox-label';
        const dot=document.createElement('span');dot.className='tag-dot-swatch';dot.style.background=tag.color;
        lbl.appendChild(dot);lbl.appendChild(document.createTextNode(tag.name));
        item.appendChild(cb);item.appendChild(lbl);body.appendChild(item);
      });
    }
    document.getElementById('modal-file-tags').classList.remove('hidden');
  }

  document.getElementById('btn-close-file-tags').addEventListener('click',()=>{
    document.getElementById('modal-file-tags').classList.add('hidden');
  });
  document.getElementById('modal-file-tags').addEventListener('click',e=>{
    if(e.target===e.currentTarget)e.currentTarget.classList.add('hidden');
  });

  return{init,render};
})();

/* =====================================================
   tagEditor.js
   ===================================================== */
const TagEditor=(()=>{
  const modal=document.getElementById('modal-tag-editor');
  const listEl=document.getElementById('tag-editor-list');
  let dragSrc=null;

  function init(){
    document.getElementById('btn-open-tag-editor').addEventListener('click',open);
    document.getElementById('btn-close-tag-editor').addEventListener('click',close);
    modal.addEventListener('click',e=>{if(e.target===modal)close()});
    document.getElementById('btn-add-tag').addEventListener('click',addTag);
    document.getElementById('new-tag-name').addEventListener('keydown',e=>{if(e.key==='Enter')addTag()});
  }
  function open(){renderList();modal.classList.remove('hidden')}
  function close(){modal.classList.add('hidden');FileList.render()}

  function renderList(){
    const tags=Store.getTags();listEl.innerHTML='';
    if(!tags.length){listEl.innerHTML='<p style="color:var(--text3);font-size:13px;padding:4px 0;">タグがまだありません</p>';return}
    tags.forEach(tag=>listEl.appendChild(buildTagItem(tag)));
  }

  function buildTagItem(tag){
    const item=document.createElement('div');
    item.className='tag-editor-item';item.dataset.id=tag.id;item.draggable=true;

    const handle=document.createElement('span');handle.className='drag-handle';
    handle.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`;

    const swatch=document.createElement('div');swatch.className='tag-color-swatch';swatch.style.background=tag.color;
    const colorPicker=document.createElement('input');colorPicker.type='color';colorPicker.value=tag.color;
    colorPicker.addEventListener('input',()=>swatch.style.background=colorPicker.value);
    colorPicker.addEventListener('change',async()=>await Store.updateTag(tag.id,{color:colorPicker.value}));
    swatch.appendChild(colorPicker);

    const nameEl=document.createElement('input');nameEl.type='text';nameEl.className='tag-editor-name-input';
    nameEl.value=tag.name;nameEl.maxLength=30;
    nameEl.addEventListener('change',async()=>{
      const v=nameEl.value.trim();
      if(v)await Store.updateTag(tag.id,{name:v});else nameEl.value=tag.name;
    });

    const btnDel=document.createElement('button');btnDel.className='tag-del-btn';
    btnDel.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
    btnDel.addEventListener('click',async()=>{await Store.deleteTag(tag.id);renderList()});

    item.appendChild(handle);item.appendChild(swatch);item.appendChild(nameEl);item.appendChild(btnDel);

    /* Drag events */
    item.addEventListener('dragstart',e=>{dragSrc=item;item.classList.add('dragging');e.dataTransfer.effectAllowed='move'});
    item.addEventListener('dragend',()=>{
      item.classList.remove('dragging');
      listEl.querySelectorAll('.tag-editor-item').forEach(i=>i.classList.remove('drag-over'));
      saveNewOrder();
    });
    item.addEventListener('dragover',e=>{
      e.preventDefault();e.dataTransfer.dropEffect='move';
      listEl.querySelectorAll('.tag-editor-item').forEach(i=>i.classList.remove('drag-over'));
      if(item!==dragSrc)item.classList.add('drag-over');
    });
    item.addEventListener('drop',e=>{
      e.preventDefault();
      if(dragSrc&&dragSrc!==item){
        const items=Array.from(listEl.querySelectorAll('.tag-editor-item'));
        if(items.indexOf(item)>items.indexOf(dragSrc))item.after(dragSrc);
        else item.before(dragSrc);
      }
    });
    setupTouchDrag(item);
    return item;
  }

  async function saveNewOrder(){
    const newOrder=Array.from(listEl.querySelectorAll('.tag-editor-item')).map(el=>el.dataset.id);
    await Store.reorderTags(newOrder);
  }

  function setupTouchDrag(item){
    let startY=0,startTop=0,clone=null;
    const handle=item.querySelector('.drag-handle');
    handle.addEventListener('touchstart',e=>{
      e.preventDefault();
      const touch=e.touches[0];startY=touch.clientY;
      const rect=item.getBoundingClientRect();startTop=rect.top;
      clone=item.cloneNode(true);
      clone.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:.75;z-index:9999;pointer-events:none;background:var(--accent-bg);border-color:var(--accent);transition:none;`;
      document.body.appendChild(clone);item.style.opacity='.3';
    },{passive:false});
    handle.addEventListener('touchmove',e=>{
      e.preventDefault();if(!clone)return;
      const dy=e.touches[0].clientY-startY;clone.style.top=(startTop+dy)+'px';
      const cloneCY=clone.getBoundingClientRect().top+clone.getBoundingClientRect().height/2;
      const siblings=Array.from(listEl.querySelectorAll('.tag-editor-item')).filter(el=>el!==item);
      siblings.forEach(s=>s.classList.remove('drag-over'));
      for(const s of siblings){
        const r=s.getBoundingClientRect();
        if(cloneCY>=r.top&&cloneCY<=r.bottom){s.classList.add('drag-over');break}
      }
    },{passive:false});
    handle.addEventListener('touchend',async()=>{
      if(!clone)return;clone.remove();clone=null;item.style.opacity='';
      listEl.querySelectorAll('.tag-editor-item').forEach(sib=>{
        if(sib!==item&&sib.classList.contains('drag-over')){
          sib.classList.remove('drag-over');
          const items=Array.from(listEl.querySelectorAll('.tag-editor-item'));
          if(items.indexOf(sib)>items.indexOf(item))sib.after(item);else sib.before(item);
        }
      });
      await saveNewOrder();
    });
  }

  async function addTag(){
    const nameInput=document.getElementById('new-tag-name');
    const colorInput=document.getElementById('new-tag-color');
    const name=nameInput.value.trim();if(!name)return;
    await Store.addTag(name,colorInput.value);
    nameInput.value='';colorInput.value='#3b82f6';renderList();
  }

  return{init};
})();

/* =====================================================
   player.js
   ===================================================== */
const Player=(()=>{
  const video=document.getElementById('video-el');
  const controls=document.getElementById('player-controls');
  const seekTrack=document.getElementById('seekbar-track');
  const seekProgress=document.getElementById('seekbar-progress');
  const seekThumb=document.getElementById('seekbar-thumb');
  const seekMarkers=document.getElementById('seekbar-markers');
  const seekLoopRange=document.getElementById('seekbar-loop-range');
  const timeCurrent=document.getElementById('time-current');
  const timeTotal=document.getElementById('time-total');
  const iconPlay=document.getElementById('icon-play');
  const iconPause=document.getElementById('icon-pause');
  const speedDisplay=document.getElementById('speed-display');
  const btnUiShow=document.getElementById('btn-ui-show');
  const btnLoopSet=document.getElementById('btn-loop-set');
  const btnLoopToggle=document.getElementById('btn-loop-toggle');
  const btnMirror=document.getElementById('btn-mirror');

  let currentFileId=null,objectUrl=null,speed=1.0;
  let mirrored=false,uiVisible=true,loopEnabled=false,loopSetStep=0;
  let isSeeking=false,rafId=null;

  async function open(fileId){
    currentFileId=fileId;speed=1.0;mirrored=false;uiVisible=true;loopEnabled=false;loopSetStep=0;
    showLoading('動画を読み込み中...');
    if(objectUrl){URL.revokeObjectURL(objectUrl);objectUrl=null}
    video.pause();video.removeAttribute('src');video.load();
    updateLoadingProgress(20);
    const blob=await dbGetBlob(fileId);
    if(!blob){hideLoading();alert('動画ファイルが見つかりません');return}
    updateLoadingProgress(60);
    objectUrl=URL.createObjectURL(blob);
    video.src=objectUrl;
    video.playbackRate=speed;
    speedDisplay.textContent=speed.toFixed(2)+'x';
    await new Promise((resolve,reject)=>{video.onloadedmetadata=resolve;video.onerror=reject}).catch(()=>{});
    updateLoadingProgress(100);hideLoading();
    video.classList.toggle('mirrored',mirrored);
    btnMirror.classList.toggle('active',mirrored);
    controls.style.display='';
    btnUiShow.classList.add('hidden');
    renderSeekbar();updateLoopButtonUI();
    if(rafId)cancelAnimationFrame(rafId);
    rafTick();
  }

  function rafTick(){
    if(!isSeeking)updateSeekbarUI();
    enforceLoop();
    rafId=requestAnimationFrame(rafTick);
  }

  function togglePlay(){if(video.paused)video.play();else video.pause()}
  video.addEventListener('play',()=>{iconPlay.style.display='none';iconPause.style.display=''});
  video.addEventListener('pause',()=>{iconPlay.style.display='';iconPause.style.display='none'});

  function getSeekPct(clientX){
    const rect=seekTrack.getBoundingClientRect();
    return clamp((clientX-rect.left)/rect.width,0,1);
  }
  function seekTo(pct){if(!isFinite(video.duration))return;video.currentTime=pct*video.duration}

  seekTrack.addEventListener('mousedown',e=>{
    isSeeking=true;seekTo(getSeekPct(e.clientX));
    const onMove=e2=>seekTo(getSeekPct(e2.clientX));
    const onUp=()=>{isSeeking=false;window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp)};
    window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
  });
  seekTrack.addEventListener('touchstart',e=>{e.preventDefault();isSeeking=true;seekTo(getSeekPct(e.touches[0].clientX))},{passive:false});
  seekTrack.addEventListener('touchmove',e=>{e.preventDefault();seekTo(getSeekPct(e.touches[0].clientX))},{passive:false});
  seekTrack.addEventListener('touchend',()=>{isSeeking=false});

  function updateSeekbarUI(){
    if(!isFinite(video.duration)||video.duration===0)return;
    const pct=video.currentTime/video.duration;
    const p=(pct*100).toFixed(3)+'%';
    seekProgress.style.width=p;seekThumb.style.left=p;
    timeCurrent.textContent=formatTime(video.currentTime);
    timeTotal.textContent=formatTime(video.duration);
  }

  function renderSeekbar(){
    if(!isFinite(video.duration)||video.duration===0)return;
    const pd=Store.getPlayerData(currentFileId);
    seekMarkers.innerHTML='';
    pd.markers.forEach(sec=>{
      const dot=document.createElement('div');dot.className='seekbar-marker-dot';
      dot.style.left=((sec/video.duration)*100).toFixed(3)+'%';
      seekMarkers.appendChild(dot);
    });
    if(pd.loop&&pd.loop.start!==null){
      const startPct=(pd.loop.start/video.duration)*100;
      seekLoopRange.classList.add('visible');
      seekTrack.querySelectorAll('.seekbar-loop-start,.seekbar-loop-end').forEach(el=>el.remove());
      const startMark=document.createElement('div');startMark.className='seekbar-loop-start';
      startMark.style.left=startPct.toFixed(3)+'%';seekTrack.appendChild(startMark);
      if(pd.loop.end!==null){
        const endPct=(pd.loop.end/video.duration)*100;
        seekLoopRange.style.left=startPct.toFixed(3)+'%';
        seekLoopRange.style.width=(endPct-startPct).toFixed(3)+'%';
        const endMark=document.createElement('div');endMark.className='seekbar-loop-end';
        endMark.style.left=endPct.toFixed(3)+'%';seekTrack.appendChild(endMark);
      }else{
        seekLoopRange.style.left=startPct.toFixed(3)+'%';seekLoopRange.style.width='0%';
      }
    }else{
      seekLoopRange.classList.remove('visible');
      seekTrack.querySelectorAll('.seekbar-loop-start,.seekbar-loop-end').forEach(el=>el.remove());
    }
  }
  video.addEventListener('loadedmetadata',()=>{timeTotal.textContent=formatTime(video.duration);renderSeekbar()});

  function skip(sec){video.currentTime=clamp(video.currentTime+sec,0,video.duration||0)}
  function changeSpeed(delta){
    speed=clamp(Math.round((speed+delta)*20)/20,0.05,10);
    video.playbackRate=speed;speedDisplay.textContent=speed.toFixed(2)+'x';
  }
  function toggleMirror(){
    mirrored=!mirrored;video.classList.toggle('mirrored',mirrored);btnMirror.classList.toggle('active',mirrored);
  }

  async function addMarker(){
    if(!isFinite(video.duration))return;
    const sec=Math.round(video.currentTime*100)/100;
    await Store.addMarker(currentFileId,sec);renderSeekbar();
  }
  async function deleteMarker(){
    const deleted=await Store.deleteNearestMarkerBefore(currentFileId,video.currentTime);
    if(deleted!==undefined)renderSeekbar();
  }
  function jumpToMarker(){
    if(!isFinite(video.duration))return;
    const pd=Store.getPlayerData(currentFileId);
    const before=pd.markers.filter(m=>m<=video.currentTime-0.1);
    if(!before.length){video.currentTime=0;return}
    video.currentTime=before[before.length-1];
  }

  async function handleLoopSet(){
    if(!isFinite(video.duration))return;
    if(loopSetStep===0){
      await Store.setLoopStart(currentFileId,video.currentTime);
      loopSetStep=1;btnLoopSet.classList.add('active');renderSeekbar();
    }else{
      const pd=Store.getPlayerData(currentFileId);
      if(video.currentTime>pd.loop.start){
        await Store.setLoopEnd(currentFileId,video.currentTime);
        loopSetStep=0;btnLoopSet.classList.remove('active');renderSeekbar();
      }
    }
  }
  function toggleLoop(){
    const pd=Store.getPlayerData(currentFileId);
    if(!pd.loop||pd.loop.start===null||pd.loop.end===null)return;
    loopEnabled=!loopEnabled;updateLoopButtonUI();
  }
  async function deleteLoop(){
    const pd=Store.getPlayerData(currentFileId);
    if(!pd.loop||pd.loop.start===null)return;
    await Store.deleteLoop(currentFileId);
    loopEnabled=false;loopSetStep=0;
    btnLoopSet.classList.remove('active');renderSeekbar();updateLoopButtonUI();
  }
  function enforceLoop(){
    if(!loopEnabled)return;
    const pd=Store.getPlayerData(currentFileId);
    if(!pd||!pd.loop||pd.loop.start===null||pd.loop.end===null)return;
    if(video.currentTime>=pd.loop.end)video.currentTime=pd.loop.start;
  }
  function updateLoopButtonUI(){btnLoopToggle.classList.toggle('active',loopEnabled)}

  function hideUi(){uiVisible=false;controls.style.display='none';btnUiShow.classList.remove('hidden')}
  function showUi(){uiVisible=true;controls.style.display='';btnUiShow.classList.add('hidden')}

  function close(){
    if(rafId){cancelAnimationFrame(rafId);rafId=null}
    video.pause();video.removeAttribute('src');video.load();
    if(objectUrl){URL.revokeObjectURL(objectUrl);objectUrl=null}
    currentFileId=null;showUi();
    btnMirror.classList.remove('active');btnLoopSet.classList.remove('active');btnLoopToggle.classList.remove('active');
    iconPlay.style.display='';iconPause.style.display='none';
    speedDisplay.textContent='1.00x';
    seekProgress.style.width='0%';seekThumb.style.left='0%';
    seekMarkers.innerHTML='';seekLoopRange.classList.remove('visible');
    seekTrack.querySelectorAll('.seekbar-loop-start,.seekbar-loop-end').forEach(el=>el.remove());
    timeCurrent.textContent='0:00';timeTotal.textContent='0:00';
  }

  document.getElementById('player-wrap').addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

  function init(){
    initNoLongPress();
    document.getElementById('btn-back').addEventListener('click',()=>{close();App.showFileList()});
    document.getElementById('btn-play-pause').addEventListener('click',togglePlay);
    document.getElementById('btn-back3').addEventListener('click',()=>skip(-3));
    document.getElementById('btn-fwd3').addEventListener('click',()=>skip(3));
    document.getElementById('btn-back5').addEventListener('click',()=>skip(-5));
    document.getElementById('btn-fwd5').addEventListener('click',()=>skip(5));
    document.getElementById('btn-mirror').addEventListener('click',toggleMirror);
    document.getElementById('btn-speed-down').addEventListener('click',()=>changeSpeed(-0.05));
    document.getElementById('btn-speed-up').addEventListener('click',()=>changeSpeed(0.05));
    document.getElementById('btn-marker-add').addEventListener('click',addMarker);
    document.getElementById('btn-marker-del').addEventListener('click',deleteMarker);
    document.getElementById('btn-marker-jump').addEventListener('click',jumpToMarker);
    document.getElementById('btn-loop-set').addEventListener('click',handleLoopSet);
    document.getElementById('btn-loop-toggle').addEventListener('click',toggleLoop);
    document.getElementById('btn-loop-del').addEventListener('click',deleteLoop);
    document.getElementById('btn-ui-hide').addEventListener('click',hideUi);
    document.getElementById('btn-ui-show').addEventListener('click',showUi);
  }

  return{init,open};
})();

/* =====================================================
   app.js
   ===================================================== */
const App=(()=>{
  const screenFileList=document.getElementById('screen-filelist');
  const screenPlayer=document.getElementById('screen-player');

  function showFileList(){
    screenPlayer.classList.remove('active');
    screenFileList.classList.add('active');
    FileList.render();
  }
  async function openPlayer(fileId){
    screenFileList.classList.remove('active');
    screenPlayer.classList.add('active');
    await Player.open(fileId);
  }
  async function boot(){
    showLoading('初期化中...');updateLoadingProgress(10);
    await Store.load();updateLoadingProgress(80);
    FileList.init();TagEditor.init();Player.init();
    updateLoadingProgress(100);hideLoading();showFileList();
  }

  document.body.addEventListener('touchmove',e=>{
    const allowed=e.target.closest('.fl-file-grid,.modal-body,.fl-tag-filter-bar');
    if(!allowed)e.preventDefault();
  },{passive:false});
  document.addEventListener('gesturestart',e=>e.preventDefault());
  document.addEventListener('gesturechange',e=>e.preventDefault());
  document.addEventListener('gestureend',e=>e.preventDefault());

  return{boot,showFileList,openPlayer};
})();

document.addEventListener('DOMContentLoaded',()=>App.boot());
</script>
