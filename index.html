<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light only" />
  <title>Video Library Player</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <main id="view-list" class="view view-list" aria-label="ファイル一覧画面">
      <header class="page-header">
        <div class="title-block">
          <h1>動画ライブラリ</h1>
          <p>GitHub Pages 上で動作するローカル保存型の再生ページ</p>
        </div>
        <div class="header-actions">
          <button id="btn-add-files" class="square-button accent" type="button" aria-label="ファイルを追加">
            <span class="icon" data-icon="add"></span>
          </button>
          <button id="btn-open-tags" class="square-button" type="button" aria-label="タグ編集画面を開く">
            <span class="icon" data-icon="tags"></span>
          </button>
          <input id="file-input" type="file" accept="video/*" multiple hidden />
        </div>
      </header>

      <section class="toolbar card">
        <div class="toolbar-row">
          <label class="field search-field">
            <span class="field-label">名前・タグ検索</span>
            <div class="field-control search-control">
              <span class="icon inline" data-icon="search"></span>
              <input id="search-input" type="search" placeholder="表示名、元のファイル名、タグ名で検索" autocomplete="off" />
            </div>
          </label>

          <label class="field sort-field">
            <span class="field-label">並べ替え</span>
            <div class="field-control select-control">
              <select id="sort-key">
                <option value="addedAt">追加順</option>
                <option value="displayName">名前順</option>
              </select>
            </div>
          </label>

          <label class="field sort-field">
            <span class="field-label">順序</span>
            <div class="field-control select-control">
              <select id="sort-dir">
                <option value="desc">降順</option>
                <option value="asc">昇順</option>
              </select>
            </div>
          </label>
        </div>

        <div class="toolbar-row wrap">
          <div class="filter-block">
            <div class="field-label">タグ絞り込み</div>
            <div id="tag-filter-chips" class="chip-row"></div>
          </div>
        </div>
      </section>

      <section class="card list-summary">
        <div id="list-count" class="list-count">0 件</div>
        <div class="list-note">ファイルを選ぶと再生画面へ移動します</div>
      </section>

      <section id="file-list" class="file-grid" aria-live="polite"></section>
    </main>

    <main id="view-player" class="view view-player hidden" aria-label="再生画面">
      <div class="player-stage">
        <video id="video-player" class="video-element" playsinline preload="metadata"></video>

        <div id="player-overlay" class="player-overlay">
          <div class="top-bar">
            <button id="btn-back-list" class="round-button" type="button" aria-label="一覧画面に戻る">
              <span class="icon" data-icon="back"></span>
            </button>

            <div class="progress-shell" aria-label="再生バー">
              <div class="progress-track" id="progress-track">
                <div class="progress-loop" id="progress-loop"></div>
                <div class="progress-played" id="progress-played"></div>
                <div class="progress-markers" id="progress-markers"></div>
                <div class="progress-handle" id="progress-handle"></div>
              </div>
            </div>

            <button id="btn-play-toggle" class="round-button" type="button" aria-label="再生と停止の切り替え">
              <span class="icon" data-icon="play"></span>
            </button>
          </div>

          <div class="control-grid">
            <section class="control-stack control-left" aria-label="シーク操作">
              <div class="control-slot top">
                <button id="btn-back-3" class="round-button" type="button" aria-label="3秒戻す">
                  <span class="icon" data-icon="rewind3"></span>
                </button>
                <button id="btn-forward-3" class="round-button" type="button" aria-label="3秒進める">
                  <span class="icon" data-icon="forward3"></span>
                </button>
              </div>

              <div class="control-slot bottom">
                <button id="btn-back-5" class="round-button" type="button" aria-label="5秒戻す">
                  <span class="icon" data-icon="rewind5"></span>
                </button>
                <button id="btn-forward-5" class="round-button" type="button" aria-label="5秒進める">
                  <span class="icon" data-icon="forward5"></span>
                </button>
              </div>

              <div class="control-slot single">
                <button id="btn-mirror" class="round-button" type="button" aria-label="左右反転">
                  <span class="icon" data-icon="mirror"></span>
                </button>
              </div>
            </section>

            <section class="control-stack control-right" aria-label="再生とマーカー操作">
              <div class="control-slot single">
                <button id="btn-speed-down" class="round-button" type="button" aria-label="再生速度を0.05下げる">
                  <span class="icon" data-icon="minus"></span>
                </button>
                <button id="btn-speed-display" class="round-button speed-readout" type="button" aria-label="再生速度">
                  1.00×
                </button>
                <button id="btn-speed-up" class="round-button" type="button" aria-label="再生速度を0.05上げる">
                  <span class="icon" data-icon="plus"></span>
                </button>
              </div>

              <div class="control-slot top">
                <button id="btn-marker-jump" class="round-button" type="button" aria-label="直前のマーカーへジャンプ">
                  <span class="icon" data-icon="marker-jump"></span>
                </button>
                <button id="btn-marker-add" class="round-button" type="button" aria-label="マーカーを設置">
                  <span class="icon" data-icon="marker-add"></span>
                </button>
                <button id="btn-marker-delete" class="round-button" type="button" aria-label="直前のマーカーを削除">
                  <span class="icon" data-icon="marker-delete"></span>
                </button>
              </div>

              <div class="control-slot bottom">
                <button id="btn-loop-set" class="round-button" type="button" aria-label="ループの始点と終点を設定">
                  <span class="icon" data-icon="loop-set"></span>
                </button>
                <button id="btn-loop-toggle" class="round-button" type="button" aria-label="ループ再生のオンオフ">
                  <span class="icon" data-icon="loop-toggle"></span>
                </button>
                <button id="btn-loop-clear" class="round-button" type="button" aria-label="ループ区間を削除">
                  <span class="icon" data-icon="loop-delete"></span>
                </button>
              </div>

              <div class="control-slot single ui-toggle-slot">
                <button id="btn-ui-hide" class="round-button" type="button" aria-label="UIを非表示">
                  <span class="icon" data-icon="hide-ui"></span>
                </button>
                <button id="btn-ui-show" class="round-button hidden" type="button" aria-label="UIを表示">
                  <span class="icon" data-icon="show-ui"></span>
                </button>
              </div>
            </section>
          </div>
        </div>

        <div id="player-loading" class="loading-overlay hidden" aria-live="polite">
          <div class="loading-card">
            <div class="spinner" aria-hidden="true"></div>
            <div id="loading-text" class="loading-text">読み込み中…</div>
            <div class="loading-bar">
              <div id="loading-bar-fill" class="loading-bar-fill"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <template id="modal-template">
    <div class="modal-backdrop" role="presentation">
      <div class="modal card" role="dialog" aria-modal="true">
        <div class="modal-header">
          <h2 class="modal-title"></h2>
          <button class="square-button modal-close" type="button" aria-label="閉じる">
            <span class="icon" data-icon="close"></span>
          </button>
        </div>
        <div class="modal-body"></div>
        <div class="modal-actions"></div>
      </div>
    </div>
  </template>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
